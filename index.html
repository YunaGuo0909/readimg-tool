<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ReadAloud">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>ReadAloud — OCR & Text-to-Speech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ReadAloud</h1>
        <p class="subtitle">Capture, recognize, and read text aloud</p>
    </header>

    <main>
        <section class="input-section">
            <div class="button-group">
                <label class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Camera
                    <input type="file" accept="image/*" capture="environment" id="cameraInput" hidden>
                </label>
                <label class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    Gallery
                    <input type="file" accept="image/*" id="galleryInput" hidden>
                </label>
            </div>

            <div id="dropZone" class="drop-zone">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p>Paste or drop an image here</p>
                <p class="hint">Ctrl+V / Cmd+V</p>
            </div>

            <div id="previewContainer" class="preview-container" hidden>
                <img id="previewImage" alt="Preview">
            </div>
        </section>

        <section id="statusSection" class="status-section" hidden>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="statusText">Preparing...</p>
        </section>

        <section id="resultSection" class="result-section" hidden>
            <div class="result-header">
                <h2>Result</h2>
                <span class="lang-badge" id="langBadge"></span>
            </div>

            <div class="speed-control">
                <label for="speedRange">Speed</label>
                <input type="range" id="speedRange" min="0.5" max="2.5" step="0.1" value="1.0">
                <span id="speedValue">1.0x</span>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="speakBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.5 4.5 0 0 0 2.5-3.5zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z"/></svg>
                    Read Aloud
                </button>
                <button class="btn btn-secondary" id="copyBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copy
                </button>
            </div>

            <div class="text-output" id="textOutput"></div>
        </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
